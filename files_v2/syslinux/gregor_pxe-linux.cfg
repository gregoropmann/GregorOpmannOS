LABEL gregor_nbd
TEXT HELP
Boot GregorOpmannOS using NBD.
It allows you to perform system maintenance with automatic root convenience over the network.
ENDTEXT
MENU LABEL GregorOpmannOS Live (%ARCH%, NBD)
LINUX ::/gregor0/boot/%ARCH%/vmlinuz-linux
INITRD ::/gregor0/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=gregor0 archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

